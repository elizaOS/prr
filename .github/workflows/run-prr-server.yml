# SERVER: Reusable workflow that runs PRR on a GitHub PR.
# Called by run-prr-client.yml (or any repo's client workflow).
#
# WHY reusable: Lets any repo run PRR via "Run workflow" without hosting the tool;
#   the job checks out this repo, builds, and runs PRR against the caller's PR.
#
# Token (required):
#   - Pass PRR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} to use the caller's token (no extra secret).
#   - Or pass a PAT (e.g. PRR_GITHUB_TOKEN: ${{ secrets.MY_PAT }}) for cross-repo or higher limits.
# WHY not "GITHUB_TOKEN": GitHub reserves that name for workflow_call; using PRR_GITHUB_TOKEN
#   avoids "secret name collides with system reserved name". We map it to GITHUB_TOKEN in the job.
#
# LLM (one of): ELIZACLOUD_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY
#
# Example client workflow (add to your repo's .github/workflows/run-prr-client.yml):
#
#   name: Run PRR
#   on:
#     workflow_dispatch:
#       inputs:
#         pr_number:
#           description: 'PR number to run PRR on'
#           required: true
#           type: string
#   jobs:
#     prr:
#       uses: OWNER/prr/.github/workflows/run-prr-server.yml@babylon
#       with:
#         pr_number: ${{ inputs.pr_number }}
#         prr_repo: 'OWNER/prr'
#         prr_ref: 'babylon'
#       secrets:
#         PRR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # caller's token, no PAT needed
#         ELIZACLOUD_API_KEY: ${{ secrets.ELIZACLOUD_API_KEY }}
#         # or ANTHROPIC_API_KEY / OPENAI_API_KEY
#
name: Run PRR (server)

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to run PRR on'
        required: true
        type: string
      prr_repo:
        description: 'Repo containing the PRR tool (e.g. owner/prr)'
        required: true
        type: string
      submit_review:
        description: 'If true, PRR will submit a PR review and post a comment (only set for manual runs)'
        required: false
        default: false
        type: boolean
      prr_ref:
        description: 'Branch, tag, or SHA to checkout (default: repo default branch). When using @babylon in uses:, pass prr_ref: "babylon" so checkout matches and npm ci succeeds.'
        required: false
        default: ''
        type: string
    secrets:
      # Caller passes their token here; we use it as GITHUB_TOKEN in the job (checkout + PRR).
      PRR_GITHUB_TOKEN:
        required: true
      ELIZACLOUD_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

jobs:
  prr:
    name: Run PRR
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write      # checkout + PRR push
      pull-requests: write # submit PR review
    steps:
      # WHY token: Checking out another repo (inputs.prr_repo) requires a token; caller's token is passed in.
      # WHY ref: When using a non-default ref (e.g. @babylon), pass prr_ref so checkout matches and npm ci sees in-sync lock file.
      - name: Checkout PRR
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.prr_repo }}
          ref: ${{ inputs.prr_ref }}
          path: prr
          token: ${{ secrets.PRR_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: prr/package-lock.json

      - name: Install and build PRR
        run: |
          cd prr
          npm ci
          npm run typecheck

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # WHY GITHUB_TOKEN: PRR expects GITHUB_TOKEN in env; we pass through the caller's token.
      # PRR_SUBMIT_REVIEW: only set true by client when run is workflow_dispatch (manual); avoids posting on CLI or label/review_requested.
      - name: Run PRR
        env:
          GITHUB_TOKEN: ${{ secrets.PRR_GITHUB_TOKEN }}
          PRR_SUBMIT_REVIEW: ${{ inputs.submit_review }}
          ELIZACLOUD_API_KEY: ${{ secrets.ELIZACLOUD_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd prr
          node dist/tools/prr/index.js \
            "https://github.com/${{ github.repository }}/pull/${{ inputs.pr_number }}" \
            --tool llm-api \
            --no-wait-bot

      # When Run PRR fails, show tail of output.log in the job log so operators see the error without downloading artifacts.
      - name: Show PRR output on failure
        if: failure() && hashFiles('prr/output.log') != ''
        run: |
          echo '=== Last 120 lines of prr/output.log ==='
          tail -n 120 prr/output.log

      # output.log + prompts.log are written to CWD (prr/) by PRR; upload as artifacts for debugging.
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prr-logs-${{ inputs.pr_number }}
          path: |
            prr/output.log
            prr/prompts.log
          retention-days: 14
          if-no-files-found: ignore
