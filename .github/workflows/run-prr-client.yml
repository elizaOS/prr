# CLIENT: Manual trigger that calls the PRR server workflow.
# Actions → Run PRR (manual) → Run workflow → enter PR number.
#
# WHY pass secrets.GITHUB_TOKEN: The job runs in this repo's context; passing the default token
#   means no extra PAT secret is needed. The server uses it for checkout and as GITHUB_TOKEN for PRR.
name: Run PRR (client)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run PRR on'
        required: true
        type: number

jobs:
  prr:
    uses: ./.github/workflows/run-prr-server.yml
    with:
      pr_number: ${{ inputs.pr_number }}
      prr_repo: ${{ github.repository }}
    secrets:
      # Caller's token; server receives it as PRR_GITHUB_TOKEN and uses it as GITHUB_TOKEN.
      PRR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ELIZACLOUD_API_KEY: ${{ secrets.ELIZACLOUD_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
