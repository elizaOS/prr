# CLIENT: Run PRR from the Actions tab (manual + PR number) or from the PR (add label).
#
# Trigger options:
#   1. Actions → Run PRR (client) → Run workflow → enter PR number.
#   2. On the PR: add the "run-prr" label; the workflow runs on that PR (no need to open Actions).
#
# WHY pass secrets.GITHUB_TOKEN: The job runs in this repo's context; no extra PAT needed.
name: Run PRR (client)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run PRR on'
        required: true
        type: number
  pull_request:
    types: [labeled]

jobs:
  prr:
    # When triggered by label, only run if the label added is "run-prr".
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-prr'
    uses: ./.github/workflows/run-prr-server.yml
    with:
      # Manual run: use input. Label run: use the PR that received the label.
      pr_number: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
      prr_repo: ${{ github.repository }}
    secrets:
      # Caller's token; server receives it as PRR_GITHUB_TOKEN and uses it as GITHUB_TOKEN.
      PRR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ELIZACLOUD_API_KEY: ${{ secrets.ELIZACLOUD_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
