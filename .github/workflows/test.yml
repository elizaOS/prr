name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Compile (emit dist/)
        run: npm run build

      - name: Run unit tests
        run: npm test -- tests/ --run

  scenario-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Compile (emit dist/)
        run: npm run build

      - name: Run scenario tests
        run: npm test -- tests/scenarios/ --run

  deterministic-tool-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Compile (emit dist/)
        run: npm run build

      - name: Run deterministic tool tests
        run: npm test -- tests/split-rewrite-plan/ tests/split-exec/ --run
